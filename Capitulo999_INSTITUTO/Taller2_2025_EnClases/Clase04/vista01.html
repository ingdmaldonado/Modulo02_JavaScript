<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTADO DE LA APLICACIÓN</title>
</head>
<body>
    <h1>GASTOS PROMEDIO</h1>
    <label for="idProvincia">INDIQUE SU PROVINCIA</label>
    <select id="idProvincia">
        <option value="1">CATAMARCA</option>
        <option value="2">LA RIOJA</option>
        <option value="3">CORDOBA</option>
    </select>
    <label for="idJubilado">Es Jubilado o Pensionado</label>
    <input type="checkbox" id="idJubilado">
    <br>
    <label for="idEnergia">Ingrese Costo Energia ECSAPEM</label>
    <input type="number" id="idEnergia">
    <br>
    <label>Ingrese Costo de ECOGAS</label>
    <input type="number" id="idGas">
    <br>
    <label>Ingrese Costo de AGUA</label>
    <input type="number" id="idAgua">
    <br>
    <input type="button" value="Calcular Promedio" id="idBtnPromedio">
    <input type="button" value="Estimar Inflacion" id="idBtnInflacion">
    
    <script src="controlador.js" type="module"></script>
</body>
</html>
