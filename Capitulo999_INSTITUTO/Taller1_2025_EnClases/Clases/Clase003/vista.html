<body>
    <!-- las Etiquetas h1 ... h6 son etiquetas de linea  -->

    <!--las etiquetas label comparten la linea -->

    <!--los parrafos son etiquetas inline-->
    <p>parrafo 1</p><p> parrafo 2</p>

    <p>hoy es dia <strong>miercoles</strong>. previo al feriado y <em>estamos</em> practicando <mark>HTML5</mark> CON VISUAL STUDIO CODE</p>
    
    <p>esto es texto normal y <small>esto es pequeño</small></p>
