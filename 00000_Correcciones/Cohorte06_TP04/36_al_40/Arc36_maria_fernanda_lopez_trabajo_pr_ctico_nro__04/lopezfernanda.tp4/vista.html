<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulo: "Fundamentos de programación con JavaScript"</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
   
<body class="bg-gradient-to-br from-blue-700 via-indigo-700 to-purple-800 min-h-screen p-8">

<div class="max-w-7xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">


    <header class="bg-gradient-to-r from-cyan-500 to-blue-700 text-white p-6">

        <h1 class="text-4xl font-bold">
            Sistema Académico Docente
        </h1>

        <p class="text-blue-100 mt-2">
            Módulo: Fundamentos de Programación con JavaScript
        </p>

    </header>

    
    <div class="flex">

        <aside class="w-1/4 bg-slate-100 p-5">

            <h2 class="font-bold text-xl mb-4 text-slate-700">
                Menú
            </h2>

            <div class="flex flex-col gap-3">

                <button id="IdBtnCohorte1"
                class="bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-500">
                    Cohorte 1
                </button>

                <button id="IdBtnCohorte2"
                class="bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-500">
                    Cohorte 2
                </button>

                <button id="IdBtnCohorte3"
                class="bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-500">
                    Cohorte 3
                </button>

                <button id="IdBtnCohorte4"
                class="bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-500">
                    Cohorte 4
                </button>

                <button id="IdBtnTotalAlumnos"
                class="bg-purple-600 text-white p-3 rounded-lg hover:bg-purple-500">
                    Nomina de alumnos
                </button>

                <button id="IdBtnAprobados"
                class="bg-green-600 text-white p-3 rounded-lg hover:bg-green-500">
                    Alumnos Aprobados
                </button>

                <button id="IdBtnDesaprobados"
                class="bg-red-600 text-white p-3 rounded-lg hover:bg-red-500">
                    Alumnos Desaprobados
                </button>

                <button id="IdBtnOrdenNotas"
                class="bg-orange-600 text-white p-3 rounded-lg hover:bg-orange-500">
                    Notas Ordenadas por merito
                </button>

            </div>

            <div class="mt-6">

                <input
                type="text"
                id="IdBtnDni"
                placeholder="Ingrese DNI"
                class="w-full border p-3 rounded-lg">

                <button
                id="IdBtnBuscarAlumnos"
                class="w-full mt-3 bg-cyan-600 text-white p-3 rounded-lg hover:bg-cyan-500">
                    Buscar Alumno
                </button>

                <button
                id="IdBtnCondicionDelAlumno"
                class="w-full mt-3  bg-green-600 text-white p-3 rounded-lg hover:bg-green-500">
                    Cantidad Alumnos Aprobados
                </button>

                
            </div>

        </aside>

       
        <main class="w-3/4 p-6">

            <h2 class="text-2xl font-bold text-slate-700 mb-4">
                Panel de Resultados
            </h2>

            <div
            id="IdResultado"
            class="bg-slate-50 border-2 border-dashed border-slate-300 rounded-xl min-h-[500px] p-5">

                <p class="text-slate-500">
                    Seleccione una opción del menú.
                </p>

            </div>

        </main>

    </div>

</div>
<script src="controlador.js" type="module"></script>
</body>
</html>
