<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    
    <div>
        <h3>Mostrar Alumnos Por Cohorte</h3>        
        <button id="PorCohorte">Mostrar Todas las Cohortes</button>        
    </div>
    <div>
        <h3>Mostrar Todas las Cohortes Juntas</h3>                
        <button id="todosAlumno">Mostrar Todas</button>
    </div>
    <div>
        <h3>Alumnos Aprobados</h3>                
        <button id="alumnosAprobados">Mostrar Aprobados</button>
    </div>
    <div>
        <h3>Alumnos Desaprobados</h3>                
        <button id="alumnosDesaprobados">Mostrar Desaprobados</button>
    </div>
    <div>
        <h3>Alumnos Ordenados Por la Nota</h3>                
        <button id="alumnosOrdenados">Mostrar Ordenados</button>
    </div>
    <div>
        <h3>Buscar Alumno por el DNI</h3>
        <label for="dni">DNI:
        <input type="text" maxlength="10" id="dni" placeholder="ingrese dni">
        </label>
        <button id="buscarAlumno">Buscar Alumno</button>
    </div>
    <div>
        <h3>Cantidad de Alumnos Aprobados</h3>                
        <button id="cantidadAprobados">Cantidad Aprobados</button>
    </div>
    <div>
        <h3>Cantidad de Alumnos Aprobados (b)</h3>                
        <button id="cantidadAprobados_b">Cantidad Aprobados</button>
    </div>
    

<script src="js/Controlador.js" type="module"></script>
</body>
</html>
