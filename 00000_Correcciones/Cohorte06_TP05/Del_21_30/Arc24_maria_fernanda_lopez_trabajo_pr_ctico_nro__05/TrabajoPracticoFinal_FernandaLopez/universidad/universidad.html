<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>

<title>Gestión de Universidades</title>
</head>
<body class="bg-slate-100">

    <div class="max-w-5xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg">

        <h1 class="text-3xl font-bold text-center text-blue-700 mb-8">
            Gestión de Universidades
        </h1>

        <div class="flex gap-4 justify-center items-center mb-8">

            <select id="IdSelectorPais" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="1">Argentina</option>
                <option value="2">Brasil</option>
            </select>

            <button id="IdBtnRecuperar" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-lg transition">
                Recuperar Universidades
            </button>

        </div>

        <div class="overflow-x-auto">

            <table  class="w-full text-left">
            <thead>
            <tr class="bg-blue-600 text-white">
            <th class="p-3">PAÍS</th>
            <th class="p-3">NOMBRE UNIVERSIDAD</th>
            <th class="p-3">PROVINCIA</th>
            <th class="p-3">URL</th>
            </tr>
            </thead>

        <tbody id="IdCuerpoDeTabla" class="text-left [&_a]:text-blue-600 [&_a]:underline">

            <tr class="border-b hover:bg-slate-100">
            <td class="p-3">Argentina</td>
            <td class="p-3">Universidad Nacional de Catamarca</td>
            <td class="p-3">Catamarca</td>
            <td class="p-3">
            <a href="http://www.unca.edu.ar" target="_blank" class="text-blue-600 hover:underline">www.unca.edu.ar</a>
            </td>
            </tr>
</tbody>

            </table>

        </div>
        </div>

    <script src="universidad.js" type="module"></script>

</body>
</html>
