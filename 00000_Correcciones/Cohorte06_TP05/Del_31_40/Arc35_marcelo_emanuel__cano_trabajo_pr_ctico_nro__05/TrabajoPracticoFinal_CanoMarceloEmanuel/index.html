<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajo Integrador Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Regla para controlar las banderas insertadas por JS */
        #idCuerpoDeTabla img {
            width: 48px !important;
            height: 32px !important;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8 px-4">
    
    <div class="max-w-6xl mx-auto">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-center text-indigo-900 mb-2">Países por Continente</h1>
            <p class="text-center text-gray-600">Selecciona un continente para ver los países</p>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center mb-6">
                <select name="" id="idSelectorContinente" class="px-4 py-2 border-2 border-indigo-300 rounded-lg focus:outline-none focus:border-indigo-600 bg-white text-gray-700 font-medium">
                    <option value="">Seleccione un Continente</option>
                    <option value="africa">Africa</option>
                    <option value="americas">Americas</option>
                    <option value="asia">Asia</option>
                    <option value="europe">Europa</option>
                    <option value="oceania">Oceania</option>
                </select>

                <button id="idBtnRecuperar" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition-colors duration-200 shadow-md">
                    Obtener Países
                </button>                
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <table class="w-full">
                <thead class="bg-indigo-600 text-white">
                    <tr>
                        <th class="px-6 py-3 text-left font-semibold">Nombre</th>
                        <th class="px-6 py-3 text-left font-semibold">Capital</th>
                        <th class="px-6 py-3 text-left font-semibold">Población</th>
                        <th class="px-6 py-3 text-left font-semibold w-32">Bandera</th>
                    </tr>
                </thead>
                <tbody id="idCuerpoDeTabla" class="divide-y divide-gray-200">
                    <tr class="hover:bg-indigo-50 transition-colors">
                        <td class="px-6 py-4 text-gray-700">Argentina</td>
                        <td class="px-6 py-4 text-gray-700">Buenos Aires</td>
                        <td class="px-6 py-4 text-gray-700">52.000.000</td>
                        <td class="px-6 py-4"><img id="idBandera" src="#" alt="nombre del pais" class="h-5 w-8 object-cover rounded"></td>
                    </tr>            
                </tbody>
            </table>
        </div>
    </div>

    <script src="/Vista/funcionesDeLaVista.js" type="module"></script>
</body>
</html>
