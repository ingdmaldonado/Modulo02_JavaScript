<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universidades</title>
    <!-- Vinculación del archivo CSS -->
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>Gestión de Universidades</h1>
    
    <div class="controles">
        <select id="idSelectorPais">
            <option value="1">ARGENTINA</option>
            <option value="2">BRASIL</option>
        </select>
        <button id="idBtnRecuperar">Recuperar universidades</button>
    </div>

    <table id="idTablaUniversidades">
        <thead>
            <tr>
                <th>País</th>
                <th>Nombre de Universidad</th>
                <th>Provincia</th>
                <th>URL</th>
            </tr>
        </thead>
        <tbody id="idCuerpoDeTabla">
            <tr>
                <td>ARGENTINA</td>
                <td>UNIVERSIDAD NACIONAL DE CATAMARCA</td>
                <td>CATAMARCA</td>
                <td><a href="http://www.unca.edu.ar" target="_blank">www.unca.edu.ar</a></td>
            </tr>
        </tbody>
    </table>

    <script src="universidad.js" type="module"></script>
</body>
</html
