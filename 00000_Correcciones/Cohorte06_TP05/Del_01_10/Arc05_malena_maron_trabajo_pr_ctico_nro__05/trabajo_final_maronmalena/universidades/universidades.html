<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universidades</title>
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <style>
table {
    width: 100%;
    border-collapse: collapse;
}

    th {
    background-color: #2563eb;
    color: white;
    padding: 12px;
}

td {
    padding: 12px;
    border-bottom: 1px solid #ddd
 }

tr:hover {
    background-color: #f3f4f6;
}

a {
    color: #2563eb;
}

a:hover {
    text-decoration: underline;
}


 

   </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-2xl p-6">

    <h1 class="text-3xl font-bold text-center text-blue-700 mb-6">Gestion de Universidades</h1>

     <div class="flex gap-4 justify-center mb-6">

    <button id="idRecuperar" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition shadow-md"> Recuperar Universidades</button>
    <select  id="idSelector"  class="border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="1">Argentina</option>
        <option value="2">Brasil</option>
    </select>
    </div>
    
    <div class="overflow-x-auto">
    <table class="w-full border-collapse rounded-lg overflow-hidden">
        <thead>
        <tr class="bg-blue-600 text-white">
            <th class="p-3 text-left">PAIS</th>
            <th class="p-3 text-left">NOMBRE</th>
            <th class="p-3 text-left">PROVINCIA</th>
            <th class="p-3 text-left">URL</th>
        </tr>
        </thead>
        <tbody id="idCuerpo">
        <tr class="border-b hover:bg-gray-50">
            <td class="p-3">Argentina</td>
            <td class="p-3">Universidad Nacional de catamarca </td>
            <td class="p-3">catamarca</td>
            <td class="p-3"><a href="http://www.unca.edu.ar" target="_blank"  class="text-blue-600 hover:underline"> UNCA</a></td>
         </tr>
        
        </tbody>
    </table>

    </div>
    </div>

    

    <script src="universidades.js" type="module"></script>
</body>
</html>
