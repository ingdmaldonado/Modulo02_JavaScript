<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*Ejercicio Nro. 03:
Realizar un programa que permita ingresar los totales que una persona pagó por sus servicios en su hogar.
El primer valor representará los gastos de energía (luz eléctrica), el segundo valor representará los gastos en
comunicación (conectividad a internet), el tercer valor representará los gastos ocasionados por el servicio de agua
potable. Se estima que para el siguiente mes estos tres valores incrementarán en un 12,5%, 7% y 3%
respectivamente. El programa debe calcular el gasto futuro a pagar.*/

// Ingreso de datos
let facElectricidad = 0;
let facCom = 0;
let facPot = 0;
facElectricidad = Number(prompt("Ingrese los gastos de Luz."));
facCom = Number(prompt("Ingrese los gastos de Conectividad/Internet."));
facPot = Number(prompt("Ingrese los gastos de Agua."));

// Gastos Actuales
console.log (facElectricidad)
console.log (facCom)
console.log (facPot)

// Calculo aumento
AumentoElectricidad = (facElectricidad * 12.5) / 100; 
AumentoCom = (facCom * 0,7) / 100;
AumentoPot = (facPot * 0,3) / 100; 

// Precios aumentados

console.log ("Aumento de luz" + AumentoElectricidad);
console.log ("Aumento de internet" + AumentoCom);
console.log ("Aumento de agua" + AumentoPot);

// Gastos futuros

let gastoElecFuturo = facElectricidad + AumentoElectricidad;
let gastoComFuturo = facCom + AumentoCom;
let gastoAguaFuturo = facPot + AumentoPot;

// Mostrar por consola

console.log ("El gasto al proximo mes de la Luz sera de" + gastoElecFuturo);
console.log ("El gasto al proximo mes del Internet sera de" + gastoComFuturo);
console.log ("El gasto al proximo mes del Agua sera de" + gastoAguaFuturo);



</script>
</body>
</html>
