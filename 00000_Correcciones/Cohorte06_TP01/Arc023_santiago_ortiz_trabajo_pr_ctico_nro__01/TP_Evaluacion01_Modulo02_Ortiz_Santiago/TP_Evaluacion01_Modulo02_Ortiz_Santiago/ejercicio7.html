<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let codigo = parseInt(prompt("Ingrese código (1- Dogui, 2- Tiernitos, 3- Dogpro):"));
    let cantidad = parseInt(prompt("Ingrese la cantidad:"));
    let precio;

if (codigo === 1) {
  if (cantidad >= 11) precio = 34000;
  else if (cantidad >= 5) precio = 36000;
  else precio = 38000;
} else if (codigo === 2) {
  if (cantidad >= 11) precio = 27000;
  else if (cantidad >= 5) precio = 29000;
  else precio = 31000;
} else if (codigo === 3) {
  if (cantidad >= 11) precio = 42000;
  else if (cantidad >= 5) precio = 44000;
  else precio = 46000;
} else {
  console.log("Código inválido");
}

let total = precio * cantidad;
console.log("Total a pagar:", + total);
    </script>
</body>
</html>
