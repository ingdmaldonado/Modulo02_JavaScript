<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let usuario = parseInt(prompt("Ingrese su edad."))
        if (usuario <= 12) {
            console.log ("Niño")
        } else {
            if (usuario <= 17) {
                console.log ("Adolescente")
            } else {
                if (usuario <= 64) {
                    console.log ("Adulto")
                } else {
                    console.log ("Adulto mayor")
                }
            }
        }
    </script>
</body>
</html>
