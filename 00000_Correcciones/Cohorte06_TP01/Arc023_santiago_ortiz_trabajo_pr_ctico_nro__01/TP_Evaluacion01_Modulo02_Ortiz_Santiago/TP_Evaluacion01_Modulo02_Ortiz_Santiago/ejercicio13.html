<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
let rubro = prompt("Ingrese rubro (vestimenta, perfumeria, libreria, electrodomesticos, calzado):");
let importe = parseFloat(prompt("Ingrese importe de la compra:"));

let descuento = 0;
let tope = 0;

switch (rubro.toLowerCase()) {
  case "vestimenta":
  case "perfumeria":
  case "calzado":
    descuento = importe * 0.20;
    tope = 80000;
    break;
  case "libreria":
    descuento = importe * 0.30;
    tope = 90000;
    break;
  case "electrodomesticos":
    descuento = importe * 0.15;
    tope = 70000;
    break;
  default:
    console.log("Invalido.");
}

if (descuento > tope) {
  descuento = tope;
}

let totalFinal = importe - descuento;

console.log("Rubro:", + rubro);
console.log("Importe:", + importe);
console.log("Descuento aplicado:", + descuento);
console.log("Total final:", + totalFinal);
    </script>
</body>
</html>
