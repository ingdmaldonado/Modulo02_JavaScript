<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 22</title>
</head>
<body>

    <h1>Cálculo de Sobre Tasa de Bebidas</h1>

    <label>Importe Base:</label>
    <input type="number" id="importeBase">
    <br><br>

    <label>Tipo de Bebida:</label>
    <select id="tipoBebida">
        <option value="1">Agua en envases plásticos</option>
        <option value="2">Agua en envases retornables</option>
        <option value="3">Gaseosas Azucaradas en envases plásticos</option>
        <option value="4">Gaseosas Azucaradas en envases retornables</option>
        <option value="5">Bebidas Energéticas</option>
        <option value="6">Otra bebida</option>
    </select>

    <br><br>

    <button id="btnCalcular">Calcular Sobre Tasa</button>
    <button id="btnGuardar">Guardar</button>
    <button id="btnRecuperar">Recuperar</button>

    <h2 id="resultado"></h2>

    <script type="module" src="ejercicio_22_controlador.js"></script>

</body>
</html>
