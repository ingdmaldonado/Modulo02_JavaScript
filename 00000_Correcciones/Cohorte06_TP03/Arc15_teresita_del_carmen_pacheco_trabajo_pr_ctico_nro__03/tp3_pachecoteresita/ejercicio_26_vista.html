<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 26</title>
</head>
<body>

    <h1>Cálculo de Dosis de Insulina</h1>

    <label>Nivel de glucosa:</label>
    <input type="number" id="glucosa">
    <br><br>

    <label>Peso corporal (kg):</label>
    <input type="number" id="peso">
    <br><br>

    <label>Tipo de diabetes:</label>
    <select id="tipoDiabetes">
        <option value="1">Tipo 1</option>
        <option value="2">Tipo 2</option>
    </select>

    <br><br>

    <button id="btnCalcular">Calcular Dosis</button>
    <button id="btnGuardar">Guardar</button>
    <button id="btnRecuperar">Recuperar</button>

    <h2 id="resultado"></h2>

    <script type="module" src="ejercicio_26_controlador.js"></script>

</body>
