<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio N°19</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    

</head>
<body class="bg-gradient-to-br from-blue-100 to-gray-200 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-gray-700 mb-6">Calcular Producto</h1>
    <label class="block text-sm font-semibold text-gray-600 mb-1" for="idCompra" for="idCompra"> Ingrese importe de la compra</label>
    <input class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400 transition" type="number" id="idCompra" placeholder="Importe de la compra"> <br>
    <label  class="block text-sm font-semibold text-gray-600 mb-1" for="idMargen"> Margen de ganancia</label>
    <input class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400 transition" type="number" id="idMargen" placeholder="Margen"> <br>

    <button class="w-full bg-blue-500 text-white py-3 rounded-xl hover:bg-blue-600 transition duration-200 shadow-md font-semibold" id="btnCalcular">Calcular</button>

    <p  class="mt-5 text-center text-lg font-semibold text-gray-700" id="resultado"></p>
    <div class="flex gap-3 mt-5">
    <button class="w-1/2 bg-green-500 text-white py-2 rounded-xl hover:bg-green-600 transition shadow-md" id="btnGuardar">Guardar</button>
    <button class="w-1/2 bg-purple-500 text-white py-2 rounded-xl hover:bg-purple-600 transition shadow-md" id="btnRecuperar">Recuperar</button>
    </div>

    </div>





    <script src="controlador_1.js" type="module"></script>
</body>
</html>
