<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Nro 19</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>

    <div>
        <h1>Impuesto a las Bebidas</h1>

        <div>
            <label for="precio">Ingrese el precio base:</label>
            <input type="number" id="precio">
        </div>
        <div>
            <label for="tipoBebida">Ingrese el tipo de bebida:</label>
            <select name="tipoBebida" id="tipoBebida">
                <option value="" disabled selected>-- Seleccionar --</option>
                <option value="0.05">Agua en envases plásticos</option>
                <option value="0.01">Agua en envases retornables</option>
                <option value="0.07">Gaseosas Azucaradas en envases plásticos</option>
                <option value="0.02">Gaseosas Azucaradas en envases retornables</option>
                <option value="0.15">Energéticas</option>
                <option value="0.01">Otra bebida no clasificada</option>
            </select>
        </div>
        <div>
            <input type="submit" value="Calcular Tasa" id="calcularTasa" />
            <input type="reset" value="Borrar" id="limpiar" />
        </div>

        <div id="resultado"></div>
    </div>

    <script src="js/Controlador.js"></script>
</body>

</html>
