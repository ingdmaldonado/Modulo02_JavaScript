<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Nro 19</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>

    <div>
        <h1>Calculadora de Precio de Venta</h1>

        <div>
            <label for="costo">Ingrese el precio de Costo:</label>
            <input type="number" name="costo" id="costo">
        </div>
        <div>
            <label for="ganancia">Ingrese el porcentaje de ganancia:</label>
            <input type="number" name="ganancia" id="ganancia">
        </div>
        <div>
            <input type="submit" value="Calcular" id="calcular" />
            <input type="reset" value="Borrar" id="limpiar" />
        </div>

        <div id="resultado"></div>
    </div>

    <script src="js/Controlador.js"></script>
</body>

</html>
