<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h1>Trabajo Práctico</h1>
    <h3>Ejercicio 22</h3>
    <label for="idEleccionBebida">Seleccione tipo de bebida</label>
    <select name="" id="idEleccionBebida">
        <option value="1">Bebidas Agua en envases plásticos = 5 ‰ (cinco por mil)</option>
        <option value="2">Bebidas Agua en envases retornables = 1 ‰ (uno por mil)</option>
        <option value="3">Bebidas Gaseosas Azucaradas en envases plásticos = 7 ‰ (siete por mil)</option>
        <option value="4">Bebidas Gaseosas Azucaradas en envases retornables = 2 ‰ (dos por mil)</option>
        <option value="5">Bebidas Energéticas = 15 ‰ (quince por mil)</option>
        <option value="6">Cualquier otra bebida no clasificada = 1 ‰ (uno por mil).</option>
    </select>
    <label for="idImporteBebida"></label>
    <input type="number" id="idImporteBebida">
    <br>
    <button id="idBtnCalcular">Calcular</button>
    <br>
    <h3 id="idResultadoBebida">Resultado</h3>
    <br>
    <button id="idBtnGuardarDatos">Guardar Datos</button>
    <button id="idBtnRestaurarDatos">Restaurar Datos</button>
</body>
