        <p>
            <label for="IdCadenaDeCaracteres">Ingrese Texto a Analizar</label>

        <p>

        </p>

        <p>
            <button id="IdContarLetrasS">Contar Letras "S"</button>
            <h5 id="IdCantidadLetrasS">ContieneMas de 2 "s"?</h5>
        </p>        

        <p>
            <button id="IdContarEspacios">Contar Espacios</button>
            <h5 id="IdCantidadEspacios">Contiene 3 o Mas espacios"?</h5>
        </p> 
        <p>
            <button id="idBtnGuardar">Guardar</button>
            <button id="idBtnRecuperar">Recuperar</button>
        </p>
