<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 26</title>
</head>
<body>
    <h1>Ejercicio 26</h1>
    <p>Calcular la dosis de insulina recomendada para un paciente diabético.</p>

    <label for="glucosa">Nivel de glucosa en sangre:</label>
    <input type="number" id="glucosa">
    <br><br>
    <label for="peso">Peso corporal (kg):</label>
    <input type="number" id="peso">
    <br><br>
    <label for="tipoDiabetes">Tipo de diabetes:</label>
    <select id="tipoDiabetes">
        <option value="1">Tipo 1</option>
        <option value="2">Tipo 2</option>
    </select>
    <br><br>
    <button id="calcular">Calcular Dosis</button>
    <button id="guardar">Guardar</button>
    <button id="recuperar">Recuperar</button>

    <p id="resultado"></p>

    <script type="module" src="controlador26.js"></script>
</body>
</html>
