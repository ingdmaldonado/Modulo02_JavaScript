<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 20</title>
</head>
<body>
    <h1>Ejercicio 20</h1>

    <h2>Calculo de promedio de notas</h2>
    <label for="primerNota">Primera nota:</label>
    <input type="number" name="primerNota" id="primerNota" min="0" max="10">
    <br>
    <label for="segundaNota">Segunda nota:</label>
    <input type="number" name="segundaNota" id="segundaNota" min="0" max="10">
    <br>
    <label for="tercerNota">Tercera nota:</label>
    <input type="number" name="tercerNota" id="tercerNota" min="0" max="10">
    <input type="button" value="Calcular" id="botonCalcular" name="botonCalcular">
    <br>
    <p name="resultado" id="resultado"></p>

    <script src="controlador.js" type="module"></script>
</body>
</html>
