<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector Multiple</title>
</head>
<body>
    <h1>Elija los Paises que desea Conocer ?</h1>
    <label for="idNombreCompleto">Ingrese Nombre Completo</label>
    <input type="text" id="idNombreCompleto">
    <input type="button" value="Aceptar Destinos" id="idBtnAceptar">
    <hr>
    <table border="2px">
        <thead>
            <th>ID</th>
            <th>NOMBRE</th>
            <th>CAPITAL</th>
            <th>POBLACION</th>
            <th>SELECCIONAR</th>
        </thead>
        <tbody id="idTableBody">
            <tr>
                <td>100</td>
                <td>ARGENTINA</td>
                <td>BUENOS AIRES</td>
                <td>47.500.000</td>
                <td><input type="checkbox"><input type="button"></td>
            </tr>
            
        </tbody>
    </table>
      <script src="ejemplo02_selectorMultiple.js" type="module"></script>
</body>
</html>
