<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos HTML</title>
</head>
<body>
    <h1>Selectores - Tipo Diabetes</h1>
    <select id="idSelectorTipoDiabetes">
        <option value="1">DIABETES TIPO 1</option>
        <option value="2">DIABETES TIPO 2</option>
    </select>
    <input type="button" value="Opcion Elegida ?" id="idBtnOpcion">


    <h1>Radio - Tipo de Diabetes</h1>
    <label for="idTipo1">DIABETES TIPO 1</label>
    <input type="radio" id="idTipo1" name="idSelectorTipoDiabetes2">
    <label for="idTipo2">DIABETES TIPO 2</label>
    <input type="radio" id="idTipo2" name="idSelectorTipoDiabetes2">

    <h1>CheckBox - Selector múltiple</h1>
    <label>Paga con Tarjeta de Crédito - 5% recargo</label>
    <input type="checkbox" id="chk1">
    <label>Paga Envio con urgencia - 2% recargo</label>
    <input type="checkbox" id="chk2">

   
    <script src="controlador.js"></script>
</body>
</html>
