<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckBox</title>
</head>
<body>
    <h1>CheckBox - Seleccion Multiple</h1>

    <label for="idPrecioProducto">Ingrese valor Producto</label>
    <br>
    <input type="number" id="idPrecioProducto" placeholder="aqui ingresar valor producto">

    <br>
    <br>
    <br>


    <label for="idPagoEnvio">Paga Envio - 5% </label>
    <input type="checkbox" id="idPagoEnvio">
    <br>
    <label for="idPagaGarantia">Incluye Garantia Extendida - 10%</label>
    <input type="checkbox" id="idPagaGarantia">
    <br>
    <input type="button" id="idBtnAceptar" value="Aceptar">

    <hr>
    <hr>

    <label>Masculino</label>
    <input type="radio" id="idMasculino" name="sexo">
    <label>Femenino</label>
    <input type="radio" id="idFemenino" name="sexo">
    <label>X</label>
    <input type="radio" id="idX" name="sexo">

    <script src="vista02.js"></script>
</body>
</html>
