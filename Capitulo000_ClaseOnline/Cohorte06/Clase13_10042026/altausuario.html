<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Clientes</title>
</head>
<body>
    <h1>Registracion de Cliente</h1>
    
    <label for="idCuit">Ingrese el Cuit del Cliente</label>
    <input type="text" id="idCuit" placeholder="Ing. el Cuit">
    <br>
    <label for="idNombre">Ingrese el Nombre Completo</label>
    <input type="text" id="idNombre" placeholder="Ing. su nombre">
    <br>
    <label>Indique la Provincia del Cliente</label>
    <select id="idProvincia">
        <option value="1">CATAMARCA</option>
        <option value="2">LA RIOJA</option>
        <option value="3">TUCUMAN</option>
    </select>
    <br>
    <button id="idBtnAceptar">Aceptar</button>
    <button id="idBtnAceptarV2">Aceptar 2</button>

    <script src="altausuario.js"></script>
</body>
</html>
